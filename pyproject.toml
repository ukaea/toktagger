[project]
name = "viz-annotation"
version = "2025.0.0"
dynamic = ["dependencies"]
requires-python = ">=3.9"
authors = [
]
maintainers = [
]
readme = "README.md"
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python"
]

[tool.setuptools]
packages = ["services"]
py-modules = ["__init__"] #

[tool.setuptools.dynamic]
dependencies = {file = ["requirements.txt"]}

[project.urls]

[tool.ruff]
exclude = [".venv", "notebooks"]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=8.4.1",
    "pytest-asyncio>=1.1.0",
    "testcontainers>=4.12.0",
]

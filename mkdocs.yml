site_name: TokTagger
theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
markdown_extensions: 
- admonition
- attr_list
- pymdownx.details
- pymdownx.highlight
- pymdownx.inlinehilite
- pymdownx.superfences
- md_in_html
- pymdownx.arithmatex:
    generic: true
nav:
  - Home: index.md
  - Creating Projects: creating_projects.md
  - Time Series Labelling: time_series.md
  - Annotators: annotators.md
  - Data Loaders: data_loaders.md
  - Advanced:
    - Custom Data Loaders: custom_dataloaders.md
    - Custom Models: custom_models.md
  - Developer Documentation: 
    - Getting Started: dev/developer-setup.md
    - Unit Tests: dev/tests.md
    - Building the Docs: dev/building-the-docs.md
    - API Design: dev/API-Design.md
    - System Architecture: dev/System-Architecture.md
    - User Interface:
      - Overall Design: dev/User-Interface-Overall-Design.md
      - Planning: dev/User-Interface-Planning.md
      - UI Details: dev/User-Interface-Details.md
      - Providers: dev/Providers.md
      - Context Menu: dev/Context-Menu-Provider.md

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (with dev extras)
        run: uv sync

      - name: Run Ruff
        run: uv run ruff check services tests --ignore=C901 && uv run ruff format --check services tests  

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./services/ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # or your project’s version

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .

  prettier:
    name: Prettier Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./services/ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # or your version

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (with dev extras)
        run: uv sync

      - name: Run tests
        run: uv run pytest
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so we can push later

      - name: Set up Node.js (>=22.19.0)
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'

      - name: Install dependencies
        run: npm --prefix services/ui ci

      - name: Build project
        run: npm --prefix services/ui run build

      - name: Commit built files
        run: |
          BUILD_DIR=services/api/static   # <-- replace with your Vite outDir
          TARGET_BRANCH=${GITHUB_REF#refs/heads/}
          git config user.name "Dr. CI Bot"
          git config user.email "ci-bot@example.com"
          git add $BUILD_DIR
          if ! git diff --cached --quiet; then
            git commit -m "chore: update build output [skip ci]"
            git push origin HEAD:$TARGET_BRANCH --force
          else
            echo "No changes to commit"
          fi
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (with dev extras)
        run: uv sync

      - name: Run Ruff
        run: uv run ruff check toktagger tests --ignore=C901 && uv run ruff format --check toktagger tests

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./toktagger/ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # or your project’s version

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .

  prettier:
    name: Prettier Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./toktagger/ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # or your version

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check .

  test_models_disabled:
    name: Pytest (Models Disabled)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install playwright
        run: uv run --group dev python -m playwright install --with-deps

      - name: Run unit tests
        run: uv run --group dev pytest tests/api

      - name: Run end to end tests
        run: uv run --group dev pytest tests/end_to_end

  test_models_enabled:
    name: Pytest (Models Enabled)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install playwright
        run: uv run --all-extras python -m playwright install --with-deps

      - name: Run unit tests
        run: uv run --all-extras pytest tests/api

      - name: Run end to end tests
        run: uv run --all-extras pytest tests/end_to_end

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed so we can push later
          ref: ${{ github.head_ref }} # PR source branch

      - name: Merge main into branch
        run: |
          git config user.name "Dr. CI Bot"
          git config user.email "ci-bot@example.com"

          # Fetch main
          git fetch origin main

          # Merge main into current branch
          git merge origin/main --no-edit

      - name: Set up Node.js (>=22.19.0)
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"

      - name: Install dependencies
        run: npm --prefix toktagger/ui ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      - name: Build project
        run: npm --prefix toktagger/ui run build

      - name: Regenerate example toml files
        run: python scripts/generate_example_config.py

      - name: Commit built files
        run: |
          BUILD_DIR=toktagger/api/static   # <-- replace with your Vite outDir
          git add $BUILD_DIR
          git add toktagger.example.toml
          if ! git diff --cached --quiet; then
            git commit -m "chore: update build output [skip ci]"
            git push origin HEAD
          else
            echo "No changes to commit"
          fi
